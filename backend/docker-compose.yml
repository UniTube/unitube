services:
  backend:
    build: .
    ports:
      - "8088:8088"
      - "8089:8089"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: unitube
      JWT_SECRET: unitube-secret-key
    volumes:
      - videos_storage:/storages
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: unitube
    ports:
      - "5432:5432"

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    container_name: unitube_influxDB

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    container_name: unitube_grafana

  telegraf:
    image: telegraf:latest
    container_name: unitube_telegraf
    restart: unless-stopped
    # we share the telegraf.conf file with the container, and set it to read-only
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    #serve telegraf to start and send metrics to influxdb
    depends_on:
      - influxdb
      - backend

volumes:
  videos_storage:
